- name: faithful-source-summary
  kind: ingest
  sources:
    - filename: aurora.txt
      text: |
        Project Aurora uses an append-only event log.
        The log records every accepted knowledge change.
        Rejected proposals do not alter the durable knowledge files.
  expected_phrases:
    - append-only
    - rejected

- name: cross-source-topic-update
  kind: ingest
  sources:
    - filename: review-gate.txt
      text: |
        A review gate requires human confirmation before any durable knowledge change.
        A declined proposal leaves the knowledge base unchanged.
    - filename: review-storage.txt
      text: |
        A review-first workflow keeps immutable raw source bytes.
        After an accepted review, the workflow regenerates its Markdown indexes.
  expected_phrases:
    - human confirmation
    - immutable raw
  minimum_shared_source_citations: 2
  shared_concept_type: Topic

- name: contradiction-preservation
  kind: ingest
  sources:
    - filename: northstar-offline.txt
      text: |
        The Northstar notebook has no network access.
        It is designed to remain completely offline.
    - filename: northstar-hosted.txt
      text: |
        The Northstar notebook synchronizes every note to a hosted server.
        It therefore requires network access.
  expected_phrases:
    - offline
    - requires network
    - contradict
  minimum_shared_source_citations: 2

- name: cited-answer
  kind: query
  concepts:
    - path: topics/review-gates
      title: Review gates
      description: Review separates model proposals from durable persistence.
      body: |
        # Review gates

        A review gate separates a model proposal from persistence.
        Declining the proposal leaves durable knowledge unchanged.
  question: Why is a review gate useful before persistence?
  expected_phrases:
    - review
    - persistence

- name: stale-synthesis-refresh
  kind: refresh
  concepts:
    - path: topics/repository-guidance-practitioner-evidence
      title: Repository guidance practitioner evidence
      description: Earlier practitioner observations about repository-local agent guidance.
      body: |
        # Repository guidance practitioner evidence

        Practitioner reports suggest that concise repository-local guidance can reduce
        avoidable agent mistakes. The reports are observational and do not isolate guidance
        from repository familiarity, task selection, or reviewer intervention.
    - path: topics/repository-guidance-controlled-comparison
      title: Repository guidance controlled comparison
      description: A newer controlled comparison of repository guidance conditions.
      body: |
        # Repository guidance controlled comparison

        A controlled comparison randomly assigned matched repository tasks to concise guidance
        and no-guidance conditions. It measured task completion, verification failures, context
        cost, and maintenance effort by task type. The guidance condition improved completion on
        multi-file maintenance tasks but not on small localized edits.

        The study has an explicit limitation: it covered three Python repositories over a
        four-week period, so the result does not establish generalization across languages,
        repository scales, high-stakes domains, or longer maintenance horizons.
    - path: syntheses/decision-framework-for-repository-guidance
      title: Decision framework for repository guidance
      description: A provisional decision framework based on practitioner evidence.
      body: |
        # Decision framework for repository guidance

        Repository-local guidance is most useful when agents repeatedly encounter project-specific
        conventions. This provisional conclusion comes from practitioner reports and remains
        observational.

        # Citations

        - [Repository guidance practitioner evidence](/topics/repository-guidance-practitioner-evidence.md)
  refresh_target: syntheses/decision-framework-for-repository-guidance
  required_citations:
    - topics/repository-guidance-controlled-comparison
  qualification:
    scope_anchor_groups:
      - [three, '3']
      - [repository, repositories, repo, repos]
      - [python]
      - [four weeks, 4 weeks, four-week, 4-week, one month, month-long]
    clause_boundary_patterns:
      - '(?<=[.!?;])\s+'
      - '\s+(?:but|however|nevertheless|nonetheless|yet)\b[:,]?\s*'
    concessive_markers:
      - although
      - though
      - even though
      - despite
      - in spite of
      - while
    coordinating_markers:
      - and
      - but
      - yet
      - instead
    concept_patterns:
      - '\bgenerali[sz]\w*\b'
      - '\bappl\w*\b'
      - '\btransfer\w*\b'
      - '\bexten(?:d|s)\w*\b'
    universal_scope_patterns:
      - '\buniversal\w*\b'
      - '\b(?:to|across)\s+(?:all|every)\b'
      - '\b(?:all|every)\s+(?:repository|repositories|repo|repos|language|languages|time\s+horizons?|contexts?|cases?|domains?)\b'
    negation_patterns:
      - '\bnot\b'
      - '\b(?:cannot|can''t|don''t|doesn''t|isn''t|aren''t|wasn''t|weren''t|never)\b'
      - '\bno\s+(?:evidence|basis|support)\b'
    uncertainty_patterns:
      - '\b(?:not|cannot|uncertain|unknown|insufficient|unclear)\b.{0,100}\b(?:generali[sz]|transfer|appl|exten(?:d|s))'
      - '\b(?:generali[sz]|transfer|appl|exten(?:d|s))\w*.{0,100}\b(?:not|uncertain|unknown|unsupported|unestablished|unclear)\b'
    direct_forbidden_patterns:
      - '\bno (?:meaningful )?limitations?\b'
  question: >-
    Refresh this decision framework with the newer controlled comparison. Explain its explicit
    limitation and do not overstate generalization beyond the studied repositories, task types,
    language, or time horizon.
