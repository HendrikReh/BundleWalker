name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  UV_VERSION: "0.11.28"

jobs:
  supported:
    name: Supported (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15]
        python-version: ["3.13", "3.14"]
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-suffix: ${{ matrix.os }}-py${{ matrix.python-version }}
      - name: Synchronize locked environment
        run: uv sync --locked
      - name: Verify lockfile
        run: uv lock --check
      - name: Run offline tests
        run: uv run pytest -m 'not eval' -q
      - name: Check formatting
        run: uv run ruff format --check .
      - name: Lint
        run: uv run ruff check .
      - name: Type-check
        run: uv run pyright

  windows-experimental:
    name: Experimental Windows (Python ${{ matrix.python-version }})
    continue-on-error: true
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-suffix: windows-2025-py${{ matrix.python-version }}
      - name: Synchronize locked environment
        run: uv sync --locked
      - name: Verify lockfile
        run: uv lock --check
      - name: Run offline tests
        run: uv run pytest -m 'not eval' -q
      - name: Check formatting
        run: uv run ruff format --check .
      - name: Lint
        run: uv run ruff check .
      - name: Type-check
        run: uv run pyright

  required:
    name: Required
    if: always()
    needs: [supported]
    runs-on: ubuntu-24.04
    steps:
      - name: Require supported jobs
        shell: bash
        run: |
          test "${{ needs.supported.result }}" = "success"
